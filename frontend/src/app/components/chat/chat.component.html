<div class="container mt-5">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h2>Chat Room</h2>
    </div>
    <div
      class="card-body message-list p-3"
      style="height: 500px; overflow-y: auto;"
      #messageContainer
    >
      <div *ngFor="let message of messages" class="mb-3">
        <div
          [ngClass]="message.user.id === userId ? 'd-flex justify-content-end' : 'd-flex justify-content-start'"
        >
          <div
            [ngClass]="{
              'bg-primary text-white': message.user.id === userId,
              'bg-light text-dark': message.user.id !== userId
            }"
            class="p-2 rounded mb-1"
            style="width: 60%; min-height: 50px; display: flex; align-items: center;"
          >
            <div>
              <strong>{{ message.user.name }}:</strong> {{ message.content }}
              <div class="text-muted" style="font-size: 0.8rem;">{{ message.timestamp | date:'shortTime' }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="input-group">
        <input
          [(ngModel)]="newMessage"
          type="text"
          class="form-control"
          placeholder="Type your message..."
          aria-label="Message Input"
        />
        <button (click)="sendMessage()" class="btn btn-primary" type="button">Send</button>
      </div>
    </div>
  </div>
</div>
